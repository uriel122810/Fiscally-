[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@nodecfdi/sat-ws-descarga-masiva", "@nodecfdi/credentials"]

[[redirects]]
  from = "/api/sat/authenticate"
  to = "/.netlify/functions/sat-authenticate"
  status = 200

[[redirects]]
  from = "/api/sat/query"
  to = "/.netlify/functions/sat-query"
  status = 200

[[redirects]]
  from = "/api/sat/verify"
  to = "/.netlify/functions/sat-verify"
  status = 200

[[redirects]]
  from = "/api/sat/download"
  to = "/.netlify/functions/sat-download"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
